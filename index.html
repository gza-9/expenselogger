<!doctype html>
<html lang="en-GB">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f766e">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icon.svg">
  <title>Mileage Log</title>
  <style>
    :root {
      --accent: #0f766e;
      --accent-weak: #ccfbf1;
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #0f172a;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --danger: #b91c1c;
      --radius: 12px;
      --tap: 48px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 17px;
      line-height: 1.4;
    }

    main#app {
      max-width: 560px;
      margin: 0 auto;
      padding: max(env(safe-area-inset-top), 12px) 16px max(env(safe-area-inset-bottom), 24px);
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .app-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .app-header h1 {
      font-size: 22px;
      margin: 0;
    }
    #open-settings {
      min-width: var(--tap);
      min-height: var(--tap);
      background: transparent;
      border: none;
      font-size: 24px;
      cursor: pointer;
      color: var(--text-muted);
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
    }

    .banner {
      background: #fef3c7;
      border: 1px solid #fde68a;
      border-radius: var(--radius);
      padding: 12px 16px;
      color: #78350f;
      font-size: 14px;
    }
    .banner.error {
      background: #fee2e2;
      border-color: #fecaca;
      color: var(--danger);
    }

    .months { display: flex; flex-direction: column; gap: 8px; }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    button {
      font: inherit;
      min-height: var(--tap);
      padding: 0 18px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text);
      cursor: pointer;
    }
    button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
      font-weight: 600;
    }
    button.danger {
      border-color: var(--danger);
      color: var(--danger);
      background: var(--card);
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    input[type="date"],
    input[type="text"],
    input[type="number"] {
      font: inherit;
      min-height: var(--tap);
      padding: 0 12px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text);
      width: 100%;
    }

    .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .label { font-size: 13px; color: var(--text-muted); margin-bottom: 4px; display: block; }
    .muted { color: var(--text-muted); font-size: 14px; }
  </style>
</head>
<body>
  <main id="app">
    <header class="app-header">
      <h1>Mileage Log</h1>
      <button id="open-settings" aria-label="Settings">⚙</button>
    </header>
    <div id="banner" class="banner" hidden></div>
    <section id="log-form" class="card"></section>
    <section id="months" class="months"></section>
    <section id="actions" class="actions"></section>
  </main>
  <dialog id="settings-sheet"></dialog>
  <script>
    /* filled in Task 3 onward */
  </script>
</body>
</html>
