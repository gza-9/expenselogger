<!doctype html>
<html lang="en-GB">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0f766e">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icon.svg">
  <title>Mileage Log</title>
  <style>
    :root {
      --accent: #0f766e;
      --accent-weak: #ccfbf1;
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #0f172a;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --danger: #b91c1c;
      --radius: 12px;
      --tap: 48px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 17px;
      line-height: 1.4;
    }

    main#app {
      max-width: 560px;
      margin: 0 auto;
      padding: max(env(safe-area-inset-top), 12px) 16px max(env(safe-area-inset-bottom), 24px);
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .app-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .app-header h1 {
      font-size: 22px;
      margin: 0;
    }
    #open-settings {
      min-width: var(--tap);
      min-height: var(--tap);
      background: transparent;
      border: none;
      font-size: 24px;
      cursor: pointer;
      color: var(--text-muted);
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
    }

    .banner {
      background: #fef3c7;
      border: 1px solid #fde68a;
      border-radius: var(--radius);
      padding: 12px 16px;
      color: #78350f;
      font-size: 14px;
    }
    .banner.error {
      background: #fee2e2;
      border-color: #fecaca;
      color: var(--danger);
    }

    .months { display: flex; flex-direction: column; gap: 8px; }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    button {
      font: inherit;
      min-height: var(--tap);
      padding: 0 18px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text);
      cursor: pointer;
    }
    button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
      font-weight: 600;
    }
    button.danger {
      border-color: var(--danger);
      color: var(--danger);
      background: var(--card);
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    input[type="date"],
    input[type="text"],
    input[type="number"] {
      font: inherit;
      min-height: var(--tap);
      padding: 0 12px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text);
      width: 100%;
    }

    .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .label { font-size: 13px; color: var(--text-muted); margin-bottom: 4px; display: block; }
    .muted { color: var(--text-muted); font-size: 14px; }
  </style>
</head>
<body>
  <main id="app">
    <header class="app-header">
      <h1>Mileage Log</h1>
      <button id="open-settings" aria-label="Settings">⚙</button>
    </header>
    <div id="banner" class="banner" hidden></div>
    <section id="log-form" class="card"></section>
    <section id="months" class="months"></section>
    <section id="actions" class="actions"></section>
  </main>
  <dialog id="settings-sheet"></dialog>
  <script>
'use strict';

const K_SETTINGS = 'mileage.settings';
const K_TRIPS = 'mileage.trips';
const K_DIRTY = 'mileage.dirty';

const DEFAULT_SETTINGS = {
  tripRate: 27.45,
  passengerRate: 5.48,
  regulars: ['CE', 'DDR', 'HD']
};

const state = {
  settings: null,     // object
  trips: [],          // array
  dirty: false,       // boolean
  storageOk: true,
  corrupt: false      // true if any key failed to parse
};

function storageAvailable() {
  try {
    const probe = '__mileage_probe__';
    localStorage.setItem(probe, '1');
    localStorage.removeItem(probe);
    return true;
  } catch {
    return false;
  }
}

function loadJSON(key, fallback) {
  try {
    const raw = localStorage.getItem(key);
    if (raw === null) return { value: fallback, missing: true };
    return { value: JSON.parse(raw), missing: false };
  } catch (err) {
    console.error(`Failed to parse ${key}:`, err);
    state.corrupt = true;
    return { value: fallback, missing: true };
  }
}

function saveJSON(key, value) {
  if (!state.storageOk) return;
  try {
    localStorage.setItem(key, JSON.stringify(value));
  } catch (err) {
    console.error(`Failed to save ${key}:`, err);
  }
}

function setDirty(v) {
  state.dirty = !!v;
  saveJSON(K_DIRTY, state.dirty);
}

function genId() {
  return Math.random().toString(36).slice(2, 8);
}

function todayLocalISO() {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function init() {
  state.storageOk = storageAvailable();

  if (!state.storageOk) {
    state.settings = { ...DEFAULT_SETTINGS };
    state.trips = [];
    state.dirty = false;
    render();
    return;
  }

  const settingsRes = loadJSON(K_SETTINGS, { ...DEFAULT_SETTINGS });
  if (settingsRes.missing && !state.corrupt) saveJSON(K_SETTINGS, settingsRes.value);
  state.settings = settingsRes.value;

  const tripsRes = loadJSON(K_TRIPS, []);
  state.trips = Array.isArray(tripsRes.value) ? tripsRes.value : [];

  const dirtyRes = loadJSON(K_DIRTY, false);
  state.dirty = !!dirtyRes.value;

  render();
}

function render() {
  renderBanner();
  renderLogForm();
  renderMonths();
  renderActions();
}

function renderBanner() {
  const el = document.getElementById('banner');
  if (!state.storageOk) {
    el.hidden = false;
    el.className = 'banner error';
    el.textContent = "Storage unavailable — trips won't be saved. Turn off Private Browsing.";
    return;
  }
  if (state.corrupt) {
    el.hidden = false;
    el.className = 'banner error';
    el.textContent = 'Could not load some saved data — inspect localStorage in DevTools before continuing.';
    return;
  }
  el.hidden = true;
}

function renderLogForm() {
  /* filled in Task 5 */
}

function renderMonths() {
  /* filled in Task 7 */
}

function renderActions() {
  /* filled in Task 9 */
}

document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
